<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phomemo P12 Label Printer</title>
    <link rel="stylesheet" href="{{ url_for('main.static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>Phomemo P12 Label Printer</h1>
    </header>

    <section id="config-bar">
        <label for="port-input">Serial Port:</label>
        <input type="text" id="port-input" value="/dev/rfcomm0" placeholder="/dev/rfcomm0">
        <label for="dots-input">Dots:</label>
        <select id="dots-input">
            <option value="96" selected>96</option>
            <option value="72">72</option>
            <option value="48">48</option>
        </select>
        <button id="btn-connect" onclick="updateConfig()">Connect</button>
        <span id="config-status" class="status-indicator"></span>
    </section>

    <section id="label-queue-section">
        <h2>Label Queue</h2>
        <table id="label-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Type</th>
                    <th>Content</th>
                    <th>Preview</th>
                    <th>Font</th>
                    <th>Size</th>
                    <th>Weight</th>
                    <th>Slant</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="label-tbody">
            </tbody>
        </table>

        <div id="table-controls">
            <button onclick="addTextRow()">Add Text Label</button>
            <button onclick="triggerImageUpload()">Upload Image Label</button>
            <input type="file" id="image-upload-input" accept=".png,.jpg,.jpeg,.bmp,.gif,.webp" style="display:none" onchange="handleImageUpload(event)">
            <button onclick="printAll()" id="btn-print-all">Print All</button>
        </div>
    </section>

    <!-- Symbol Picker Modal -->
    <div id="symbol-modal" class="modal" style="display:none">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Insert Symbol</h3>
                <button class="modal-close" onclick="closeSymbolPicker()">&times;</button>
            </div>
            <div id="symbol-categories">
                <button class="symbol-cat-btn active" onclick="showSymbolCategory('common')">Common</button>
                <button class="symbol-cat-btn" onclick="showSymbolCategory('arrows')">Arrows</button>
                <button class="symbol-cat-btn" onclick="showSymbolCategory('warning')">Warning</button>
                <button class="symbol-cat-btn" onclick="showSymbolCategory('misc')">Misc</button>
                <button class="symbol-cat-btn" onclick="showSymbolCategory('math')">Math</button>
                <button class="symbol-cat-btn" onclick="showSymbolCategory('shapes')">Shapes</button>
            </div>
            <div id="symbol-grid"></div>
        </div>
    </div>

    <script src="{{ url_for('main.static', filename='app.js') }}"></script>
</body>
</html>
